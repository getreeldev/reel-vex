adapters:
  - type: csaf
    id: redhat
    name: Red Hat
    url: https://security.access.redhat.com/data/csaf/v2/provider-metadata.json
  - type: csaf
    id: suse
    name: SUSE
    url: https://www.suse.com/.well-known/csaf/provider-metadata.json
  # Red Hat OVAL: fills the EUS/AUS/E4S/SAP/HA/NFV coverage gap that CSAF
  # intentionally leaves (see SECDATA-1181). One adapter per OVAL file;
  # add more entries here as coverage needs grow — no code changes required.
  - type: redhat-oval
    id: redhat-oval-rhel-9.6-eus
    url: https://security.access.redhat.com/data/oval/v2/RHEL9/rhel-9.6-eus.oval.xml.bz2
  # Canonical OpenVEX: single tarball at vex-all.tar.xz containing per-CVE
  # OpenVEX 0.2.0 documents. Strict superset of the USN-derived OVAL feeds
  # below — covers pre-USN triage state (`not_affected`,
  # `under_investigation`) that OVAL never emits. ESM-track distro qualifier
  # values are normalised to scanner-convention `ubuntu-<version>` in the
  # adapter; no external alias file needed.
  - type: ubuntu-vex
    id: ubuntu-vex
    url: https://security-metadata.canonical.com/vex/vex-all.tar.xz
  # Ubuntu OVAL: per-release USN feeds (the main, non-OCI variants).
  # DEPRECATED: superseded by ubuntu-vex; removal queued for v0.5.0.
  # Both run during the soak window so we can verify the OpenVEX feed has
  # parity with the OVAL feeds before retiring them. The two emit different
  # source_format values (`oval` vs `openvex`); the statements PK includes
  # source_format so they coexist by design.
  #
  # We deliberately do not use Canonical's OCI-flavoured feeds
  # (oci.com.ubuntu.<release>...). Those scope to container-relevant
  # packages by stripping kernel/HWE/driver content — a scoping decision
  # that belongs to the scanner, not to us. vex.getreel.dev is a general
  # VEX hub; a consumer scanning a bare-metal Ubuntu host or a VM
  # filesystem should get the same coverage as one scanning a container.
  - type: ubuntu-oval
    id: ubuntu-oval-noble
    name: Ubuntu 24.04 LTS
    url: https://security-metadata.canonical.com/oval/com.ubuntu.noble.usn.oval.xml.bz2
  - type: ubuntu-oval
    id: ubuntu-oval-jammy
    name: Ubuntu 22.04 LTS
    url: https://security-metadata.canonical.com/oval/com.ubuntu.jammy.usn.oval.xml.bz2
  - type: ubuntu-oval
    id: ubuntu-oval-focal
    name: Ubuntu 20.04 LTS
    url: https://security-metadata.canonical.com/oval/com.ubuntu.focal.usn.oval.xml.bz2
  # Debian Security Tracker OVAL: per-release feeds covering both DSAs
  # (class=patch) and per-CVE records (class=vulnerability) with fixed
  # version bounds. One adapter per supported release; add new entries
  # here as Debian ships new stable releases.
  - type: debian-oval
    id: debian-oval-bookworm
    name: Debian 12 (bookworm)
    url: https://www.debian.org/security/oval/oval-definitions-bookworm.xml.bz2
  - type: debian-oval
    id: debian-oval-bullseye
    name: Debian 11 (bullseye)
    url: https://www.debian.org/security/oval/oval-definitions-bullseye.xml.bz2
  - type: debian-oval
    id: debian-oval-trixie
    name: Debian 13 (trixie)
    url: https://www.debian.org/security/oval/oval-definitions-trixie.xml.bz2

aliases:
  - type: redhat-repository-to-cpe
    id: redhat
    # Uses the default URL (security.access.redhat.com/data/metrics/repository-to-cpe.json).
    # Override via `url:` if you mirror the file internally.
