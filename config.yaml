adapters:
  - type: csaf
    id: redhat
    name: Red Hat
    url: https://security.access.redhat.com/data/csaf/v2/provider-metadata.json
  - type: csaf
    id: suse
    name: SUSE
    url: https://www.suse.com/.well-known/csaf/provider-metadata.json
  # Red Hat OVAL: fills the EUS/AUS/E4S/SAP/HA/NFV coverage gap that CSAF
  # intentionally leaves (see SECDATA-1181). One adapter per OVAL file;
  # add more entries here as coverage needs grow — no code changes required.
  - type: redhat-oval
    id: redhat-oval-rhel-9.6-eus
    url: https://security.access.redhat.com/data/oval/v2/RHEL9/rhel-9.6-eus.oval.xml.bz2
  # Ubuntu OVAL (OCI variants): per-release USN feeds with kernel/HWE
  # noise stripped, focused on container-scanning needs. One adapter per
  # supported LTS release; add new entries here as Canonical ships new
  # LTS releases (next: 26.04).
  - type: ubuntu-oval
    id: ubuntu-oval-noble-oci
    name: Ubuntu 24.04 LTS (OCI)
    url: https://security-metadata.canonical.com/oval/oci.com.ubuntu.noble.usn.oval.xml.bz2
  - type: ubuntu-oval
    id: ubuntu-oval-jammy-oci
    name: Ubuntu 22.04 LTS (OCI)
    url: https://security-metadata.canonical.com/oval/oci.com.ubuntu.jammy.usn.oval.xml.bz2
  - type: ubuntu-oval
    id: ubuntu-oval-focal-oci
    name: Ubuntu 20.04 LTS (OCI)
    url: https://security-metadata.canonical.com/oval/oci.com.ubuntu.focal.usn.oval.xml.bz2

aliases:
  - type: redhat-repository-to-cpe
    id: redhat
    # Uses the default URL (security.access.redhat.com/data/metrics/repository-to-cpe.json).
    # Override via `url:` if you mirror the file internally.
