name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test ./...

      - name: Integration tests
        run: go test -tags integration -v ./test/integration/

  publish-image:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Compute tags
        id: tags
        run: |
          VERSION="${GITHUB_REF_NAME}"
          MAJOR="${VERSION%%.*}"  # v0.1.0 → v0
          {
            echo "version=${VERSION}"
            echo "major=${MAJOR}"
          } >> "$GITHUB_OUTPUT"
          echo "Will publish: getreel/vex-hub:${VERSION}, :${MAJOR}, :latest"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            getreel/vex-hub:${{ steps.tags.outputs.version }}
            getreel/vex-hub:${{ steps.tags.outputs.major }}
            getreel/vex-hub:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "vex-hub ${GITHUB_REF_NAME}" \
            --generate-notes
