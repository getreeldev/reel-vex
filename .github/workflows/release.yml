name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # Run the full CI suite first (build, vet, unit-test, integration-test).
  # Reused from ci.yml so each test shows up as its own box in the UI.
  test:
    uses: ./.github/workflows/ci.yml

  # Build the image and scan it with reel (our own GitHub Action).
  # Eats our own dogfood: SBOM + vulnerability + malware scan in one step.
  # Fails the release if HIGH/CRITICAL findings survive the filters.
  scan:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image into local daemon
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: vex-hub:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Dogfood: scan the locally-built image with the reel GitHub Action.
      # reel CLI v1.3+ resolves --image local-first with a registry fallback,
      # so the just-built vex-hub:scan in the runner's daemon is found without
      # any special `local: true` input.
      - name: Scan image with reel
        uses: getreeldev/releases@v1
        with:
          image: vex-hub:scan
          scan-types: sbom,cbom,malware
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          fail-on-findings: true

      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-results
          path: reel-results/
          if-no-files-found: ignore

  # Build (cache hit from `scan` job), tag, and push to Docker Hub.
  publish-image:
    needs: scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute tags
        id: tags
        run: |
          VERSION="${GITHUB_REF_NAME}"
          MAJOR="${VERSION%%.*}"   # v0.1.0 → v0
          {
            echo "version=${VERSION}"
            echo "major=${MAJOR}"
          } >> "$GITHUB_OUTPUT"
          echo "Will publish: getreel/vex-hub:${VERSION}, :${MAJOR}, :latest"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            getreel/vex-hub:${{ steps.tags.outputs.version }}
            getreel/vex-hub:${{ steps.tags.outputs.major }}
            getreel/vex-hub:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  gh-release:
    needs: publish-image
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "vex-hub ${GITHUB_REF_NAME}" \
            --generate-notes
